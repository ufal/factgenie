easy-vqa:
  class: basic.HTMLDataset
  description: A toy visual question answering dataset. Provided as an example dataset
    loaded by the <code>basic.HTMLDataset</code> class.
  enabled: true
  splits:
  - test
logicnlg-100:
  class: logicnlg.LogicNLG
  description: Sample of 100 examples from the  <a href="https://github.com/wenhuchen/LogicNLG">LogicNLG</a>
    dataset. Provided as an example dataset loaded from Huggingface, including post-processing
    with custom outputs.
  enabled: true
  splits:
  - test
quintd1-gsmarena:
  class: gsmarena.GSMArena
  description: '<p>The <code>gsmarena</code> subset of the <a href="https://github.com/kasnerz/quintd/">quintd-1
    dataset</a>.  Contains mobile phone specifications from GSMArena.com.</p><p><i>Note:
    annotations and GPT-3.5 outputs are available only for the test set.</i></p>'
  enabled: true
  splits:
  - dev
  - test
